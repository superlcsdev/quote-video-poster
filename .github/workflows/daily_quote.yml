name: Daily Quote Video (7AM SGT)

on:
  schedule:
    - cron: '0 23 * * *'   # 11:00 PM UTC = 7:00 AM SGT next day
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install system dependencies (ffmpeg for MoviePy)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Create output directories
        run: mkdir -p output_videos temp

      - name: Run pipeline
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          PIXABAY_API_KEY:  ${{ secrets.PIXABAY_API_KEY }}
          FB_PAGE_ID:       ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN:  ${{ secrets.FB_ACCESS_TOKEN }}
        run: python main.py

      - name: Commit quote history to repo
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add quote_history.json || true
          git diff --staged --quiet || git commit -m "chore: update quote history [skip ci]"
          git push || true

      - name: Upload video artifact
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: quote-reel-video
          path: output_videos/
          retention-days: 7
